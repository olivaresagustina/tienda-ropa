<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Huasteca Studio V2</title><link rel='stylesheet' href='style.css'></head><body>
<header><h1>Huasteca Studio</h1><div id='userBox'></div></header>
<section id='authBox'><input id='email' placeholder='Correo'><input id='password' type='password' placeholder='Contraseña'><button onclick='registerUser()'>Registrarse</button><button onclick='loginUser()'>Entrar</button></section>
<section id='adminPanel' class='hidden'><h2>Admin</h2><input id='pn' placeholder='Producto'><input id='pp' placeholder='Precio'><button onclick='addProduct()'>Agregar</button></section>
<section><h2>Catálogo</h2><div id='products'></div></section>
<section><h2>Carrito</h2><div id='cart'></div><button onclick='checkout()'>Finalizar compra</button></section>
<script type='module' src='app.js'></script></body></html>
