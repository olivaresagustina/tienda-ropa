<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda de Ropa Online</title>
<link rel="stylesheet" href="style.css">
</head>
<body>


    <!-- 🔐 LOGIN -->
<div class="formulario" id="loginBox">
    <h2>Login</h2>
  
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
  
    <button onclick="login()">Iniciar sesión</button>
    <button onclick="registrar()">Registrarse</button>
  </div>
  
  <!-- 🛍️ APP -->
 
  <div class="app" id="appBox" style="display:none;">

    <header class="header">
      <h1>ZARA</h1>
      <button onclick="logout()">Cerrar sesión</button>
    </header>
  
    <div class="formulario">
      <h2>Agregar producto</h2>
  
      <input type="text" id="prenda" placeholder="Nombre">
      <input type="text" id="categoria" placeholder="Categoría">
      <input type="number" id="precio" placeholder="Precio">
      <input type="number" id="stock" placeholder="Stock">
  
      <button onclick="guardarRopa()">Guardar</button>
    </div>
  
    <div class="catalogo">
      <ul id="listaRopa"></ul>
    </div>
  
  </div>


  
    <div class="lista">
      <h2>Productos Registrados</h2>
      <ul id="listaRopa"></ul>
    </div>
  
  </div>



<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
